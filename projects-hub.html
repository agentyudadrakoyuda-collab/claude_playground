<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DrakoYuda Projects Hub</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            forest: '#2D5F3F',
            'forest-dark': '#1E4029',
            'forest-light': '#3D7A54',
            gold: '#D4AF37',
            'gold-light': '#E8C84A',
            'gold-dark': '#B8961F',
          }
        }
      }
    }
  </script>
  <style>
    body { background-color: #0f1a13; }
    .card-hover { transition: transform 0.2s ease, box-shadow 0.2s ease; }
    .card-hover:hover { transform: translateY(-4px); box-shadow: 0 12px 40px rgba(212, 175, 55, 0.2); }
    .gold-shimmer {
      background: linear-gradient(90deg, #D4AF37, #E8C84A, #D4AF37);
      background-size: 200% auto;
      animation: shimmer 2.5s linear infinite;
    }
    @keyframes shimmer { to { background-position: 200% center; } }
  </style>
</head>
<body>
  <div id="root"></div>
  <script>
    const e = React.createElement;

    const projects = [
      {
        id: 'tetris',
        title: 'Tetris MVP',
        description: 'Classic Tetris game built as a minimum viable product. Fully playable in the browser with keyboard controls, scoring, and level progression.',
        icon: '🎮',
        href: '/claude_playground/index.html',
        tag: 'Game',
        tagColor: 'bg-purple-800 text-purple-200',
      },
      {
        id: 'dashboard',
        title: 'Dashboard',
        description: 'DrakoYuda execution lab dashboard. A rich data visualisation interface for tracking metrics, projects, and operational insights.',
        icon: '📊',
        href: '/execution-lab/index.html',
        tag: 'Analytics',
        tagColor: 'bg-blue-800 text-blue-200',
      },
    ];

    function Badge({ text, className }) {
      return e('span', {
        className: `text-xs font-semibold px-2 py-0.5 rounded-full ${className}`
      }, text);
    }

    function ProjectCard({ project }) {
      return e('div', {
        className: 'card-hover bg-forest-dark border border-forest-light rounded-2xl p-6 flex flex-col gap-4'
      },
        e('div', { className: 'flex items-start justify-between' },
          e('span', { className: 'text-4xl' }, project.icon),
          e(Badge, { text: project.tag, className: project.tagColor })
        ),
        e('div', { className: 'flex flex-col gap-2 flex-1' },
          e('h2', { className: 'text-xl font-bold text-white' }, project.title),
          e('p', { className: 'text-sm text-gray-400 leading-relaxed flex-1' }, project.description)
        ),
        e('a', {
          href: project.href,
          className: 'mt-2 inline-flex items-center justify-center gap-2 px-5 py-2.5 rounded-xl font-semibold text-sm gold-shimmer text-forest-dark hover:opacity-90 transition-opacity'
        },
          'View Live',
          e('svg', {
            xmlns: 'http://www.w3.org/2000/svg',
            className: 'w-4 h-4',
            fill: 'none',
            viewBox: '0 0 24 24',
            stroke: 'currentColor',
            strokeWidth: 2
          },
            e('path', { strokeLinecap: 'round', strokeLinejoin: 'round', d: 'M17 8l4 4m0 0l-4 4m4-4H3' })
          )
        )
      );
    }

    function Header() {
      return e('header', { className: 'border-b border-forest' },
        e('div', { className: 'max-w-5xl mx-auto px-6 py-5 flex items-center justify-between' },
          e('div', { className: 'flex items-center gap-3' },
            e('div', {
              className: 'w-10 h-10 rounded-xl bg-forest flex items-center justify-center text-gold font-bold text-lg shadow-lg'
            }, 'DY'),
            e('div', {},
              e('span', { className: 'text-white font-bold text-lg tracking-tight' }, 'DrakoYuda'),
              e('span', { className: 'text-gold font-light text-lg tracking-tight' }, ' Projects Hub')
            )
          ),
          e('nav', { className: 'hidden sm:flex items-center gap-6 text-sm text-gray-400' },
            e('a', { href: '#projects', className: 'hover:text-gold transition-colors' }, 'Projects'),
            e('a', { href: 'https://github.com/agentyudadrakoyuda-collab/claude_playground', target: '_blank', rel: 'noopener noreferrer', className: 'hover:text-gold transition-colors' }, 'GitHub')
          )
        )
      );
    }

    function Hero() {
      return e('section', { className: 'max-w-5xl mx-auto px-6 pt-16 pb-10 text-center' },
        e('h1', { className: 'text-4xl sm:text-5xl font-extrabold text-white leading-tight' },
          'All Projects, ',
          e('span', { className: 'text-gold' }, 'One Place')
        ),
        e('p', { className: 'mt-4 text-gray-400 text-lg max-w-xl mx-auto' },
          'Explore everything built under the DrakoYuda umbrella — games, dashboards, and experiments.'
        )
      );
    }

    function ProjectsGrid() {
      return e('section', { id: 'projects', className: 'max-w-5xl mx-auto px-6 pb-16' },
        e('div', { className: 'mb-8 flex items-center gap-3' },
          e('div', { className: 'h-px flex-1 bg-forest' }),
          e('span', { className: 'text-gold text-sm font-semibold uppercase tracking-widest' }, 'Projects'),
          e('div', { className: 'h-px flex-1 bg-forest' })
        ),
        e('div', { className: 'grid grid-cols-1 sm:grid-cols-2 gap-6' },
          ...projects.map(p => e(ProjectCard, { key: p.id, project: p }))
        )
      );
    }

    function Footer() {
      return e('footer', { className: 'border-t border-forest' },
        e('div', { className: 'max-w-5xl mx-auto px-6 py-6 flex flex-col sm:flex-row items-center justify-between gap-2 text-sm text-gray-500' },
          e('span', {}, '© 2026 DrakoYuda. All rights reserved.'),
          e('span', { className: 'text-forest-light' }, 'Built with React + Tailwind CSS')
        )
      );
    }

    function App() {
      return e('div', { className: 'min-h-screen flex flex-col' },
        e(Header),
        e('main', { className: 'flex-1' },
          e(Hero),
          e(ProjectsGrid)
        ),
        e(Footer)
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(e(App));
  </script>
</body>
</html>
